      properties:
        type:
          type: string
          description: |
            **Allowed Values**

            - Transfer
            - Loan Payment
            - Loan Principal Only Transfer
        nextTransferDate:
          type: string
          description: |-
            1. Should be in "yyyy-MM-dd" format
            2. Should be today or a Future Date
            3. Required to be passed only for Types: Transfer and Loan Principal Only Transfer
            4. Value passed for Type: Loan Payment will not be considered and will not be stored
        expirationDate:
          type: string
          description: |
            1. Should be in "yyyy-MM-dd" format
            2. Should be today or a Future Date
            3. When the frequency is One time Only, the expiration Date will set same as nextTransferDate.
        sourceAccountNumber:
          type: string
          description: Atleast one of Source and target account should belong to the customer
        targetAccountNumber:
          type: string
          description: |-
            1. Atleast one of Source and target account should belong to the customer
            2. Should be a Loan Account for types: Loan Payment and Loan Principal Only Transfer
        advanceDaysToMakePayment:
          type: integer
          description: 'Value passed for Types: Transfer and Loan Principal Only Transfer will not be considered and will not be stored'
        amount:
          type: number
          description: Required for External Transfer and External Loan Prinicpal Only Transfer
        transferCharge:
          type: number
          description: 'Value passed for Types: Loan Payment and Loan Principal Only Transfer will not be considered and will not be stored'
        transferChargeCode:
          type: string
          description: 'Value passed for Types: Loan Payment and Loan Principal Only Transfer will not be considered and will not be stored'
        frequency:
          type: string
          description: |-
