  '/v1.0/customers/{customerId}/accounts/{accountId}':
    get:
      tags:
        - accounts
      summary: Get customer account
      description: |-
        > Retrieves the details of an existing customer account.
        > The check is applied based on the unique customer identifier that was returned, upon customer creation.
        >
        > __Use this API to get the details of the specified Account details.
      operationId: get-v1.0-customers-customerId-accounts-accountId
      parameters:
        - $ref: '#/components/parameters/content-type'
        - name: Authorization
          in: header
          schema:
            type: string
        - name: customerId
          in: path
          description: Customer unique identification number
          required: true
          schema:
            type: number
            example: 24958
        - name: accountId
          in: path
          description: customer account unique identification number
          required: true
          schema:
            type: number
            example: 41100124191
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account.v1_1'
        '201':
          description: ''
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
      security:
        - apiKey: []
        - basicAuth: []
        - jwtAuth: []
      servers:
        - url: 'https://localhost:8080'
    patch:
      tags:
        - accounts
      summary: Update customer account
      description: Updates the specified customer account
      operationId: patch-v1.1-customers-customerId-accounts-accountId
      parameters:
        - $ref: '#/components/parameters/content-type'
        - name: Authorization
          in: header
          schema:
            type: string
        - name: customerId
          in: path
          description: Customer unique identification number
          required: true
          schema:
            type: number
            example: 24958
        - name: accountId
          in: path
          description: customer account unique identification number
          required: true
          schema:
            type: number
            example: 41100124191
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  $ref: '#/components/schemas/Account-common.v1_0'
                loanAccount:
                  $ref: '#/components/schemas/LoanAccount'
                cdAccount:
                  $ref: '#/components/schemas/CDAccount'
                checkingAccount:
                  $ref: '#/components/schemas/CHKAccount'
                safeDepositBox:
                  $ref: '#/components/schemas/SafeDepositBox'
                savingsAccount:
                  $ref: '#/components/schemas/SavingsAccount'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseStatus:
                    $ref: '#/components/schemas/ResponseStatus.v1_1'
                  data:
                    $ref: '#/components/schemas/Account.v1_3'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
      security:
        - apiKey: []
        - basicAuth: []
        - jwtAuth: []
      servers:
        - url: 'https://localhost:8080'
