            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                commitPointInfo:
                  $ref: '#/components/schemas/TransactionCommit'
                businessOwner:
                  type: object
                  description: |-
                    System Checks if the Customer exists using Tax ID Number.
                    If exists, retrieves from system.
                    If not, Creates the Customer.
                  properties:
                    data:
                      $ref: '#/components/schemas/Customer-common.v1_2'
                    attributes:
                      type: object
                      description: |-
                        Account Holder Info:
                        1. Client ID and Relationship as Owner will be set by the system.
                      properties:
                        organizationInfo:
                          $ref: '#/components/schemas/Customer-organization.v1_1'
                        uploadedDocuments:
                          type: array
                          items:
                            $ref: '#/components/schemas/CustomerDocument'
                        userDefinedFields:
                          type: array
                          items:
                            $ref: '#/components/schemas/UserDefinedFields'
                        accountHolderInfo:
                          $ref: '#/components/schemas/AccountHolderInfo'
                    businessOwnerAccount:
                      type: object
                      description: Creates Loan Account. Please ignore AccountHolderInfo in data - Should be set as null as it is set from the customer attributes.
                      properties:
                        data:
                          $ref: '#/components/schemas/Account-common.v1_0'
                        attributes:
                          type: object
                          properties:
                            loanAccount:
                              $ref: '#/components/schemas/LoanAccount'
                            userDefinedFields:
                              type: array
                              items:
                                $ref: '#/components/schemas/UserDefinedFields'
                            uploadedDocuments:
                              type: array
                              items:
                                $ref: '#/components/schemas/AccountDocument'
                individuals:
                  type: array
                  description: |-
                    System Checks if the Customer exists using Tax ID Number.
                    If exists, retrieve from system.
                    If not, saves the Customer.
                  items:
                    type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Customer-common.v1_2'
                      attributes:
                        type: object
                        properties:
                          accountHolderInfo:
                            $ref: '#/components/schemas/AccountHolderInfo'
                          individualInfo:
                            $ref: '#/components/schemas/Customer-individual.v1_1'
                          uploadedDocuments:
                            type: array
                            items:
                              $ref: '#/components/schemas/CustomerDocument'
                          userDefinedFields:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserDefinedFields'
                          olbInfo:
                            type: object
                            properties:
                              olbFlag:
                                type: boolean
                              olbLoginId:
                                type: string
                externalTransfer:
                  $ref: '#/components/schemas/ExternalTransfer'
                disbursement:
                  $ref: '#/components/schemas/DisbursementTransaction.v1_0'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: '#/components/schemas/ResponseStatus.v1_1'
