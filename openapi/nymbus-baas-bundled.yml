openapi: 3.0.0
info:
  version: 1.2.9
  title: Nymbus Core API
  description: Nymbus Core public API
  contact:
    name: Nymbus API Architect
  license:
    name: MIT
servers:
  - url: 'https://localhost:8080'
paths:
  /v1.0/customers:
    get:
      tags:
        - customers
      summary: Get the list of customers
      description: |
        > Retrieve the list of Customers. Paging can be applied.
        >
        > Use this API to get the list of customer details.
      operationId: get-v1.1-customers
      parameters:
        - $ref: '#/components/parameters/content-type'
        - name: Authorization
          in: header
          schema:
            type: string
        - name: pageLimit
          in: query
          description: Maximum number of rows/page that will be returned. Maximum is 1000 rows.
          schema:
            type: number
            maximum: 1000
            default: 100
        - name: pageOffset
          in: query
          description: Number of pages to skip.
          schema:
            type: number
            default: 0
        - name: customerIds
          in: query
          description: Comma Separated Cusotmer Ids
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer-common.v1_1'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
      security:
        - apiKey: []
        - basicAuth: []
        - jwtAuth: []
      servers:
        - url: 'https://localhost:8080'
      x-internal: false
    post:
      tags:
        - customers
      summary: Create Customer
      description: Create Customer
      operationId: post-v1.0-customers
      parameters:
        - $ref: '#/components/parameters/content-type'
        - name: Authorization
          in: header
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    customer:
                      $ref: '#/components/schemas/Customer-common.v1_2'
                    individualInfo:
                      $ref: '#/components/schemas/Customer-individual.v1_1'
                    organizationInfo:
                      $ref: '#/components/schemas/Customer-organization.v1_1'
                  required:
                    - customer
              required:
                - data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseStatus:
                    $ref: '#/components/schemas/ResponseStatus.v1_1'
                  customer:
                    $ref: '#/components/schemas/Customer.v1.2'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
      security:
        - apiKey: []
        - basicAuth: []
        - jwtAuth: []
      servers:
        - url: 'https://localhost:8080'
