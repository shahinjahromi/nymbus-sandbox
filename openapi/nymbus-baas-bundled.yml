            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: true/false
                    default: true
                  errors:
                    type: object
                    properties:
                      message:
                        type: string
                        example: errors occurred while committing transaction
                      code:
                        type: string
                        example: code-123
                  data:
                    type: object
                    properties:
                      transactionHeader:
                        type: object
                        properties:
                          reference:
