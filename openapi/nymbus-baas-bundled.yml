    UserDefinedFieldsV1_1:
      type: object
      title: UserDefinedFieldsV1_1
      description: |-
        User Defined Values: Please refer to the Maintenance Screen of the Customer in Frontoffice for allowed values for keys.
        Refer to Core Frontoffice
        Screen: Customer/Account - Maintenenace
        Section: Tools
        Select Tool as User Defined Fields and Launch

