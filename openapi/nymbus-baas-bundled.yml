  /v1.0/transactions/externalTransfer:
    post:
      tags:
        - transactions
      summary: Create External Transfer
      description: |-
        - This API support request idempotency, allowing you to call an operation multiple times and assume that its work will be done no more than once. You may use any string of up to 40 characters as an idempotency key (we recommend UUID version 4). The key should be passed as a header with the key named as x-idempotency-key
        - The guarantee of idempotency is crucial when an API call has failed without a clear reason and a retry is due. For example, if creating a payment does not succeed due to a network error, you can safely retry creating the payment, passing the same idempotency key and assume the payment will occur no more than once, regardless of the number of calls.
        - Idempotency keys are guaranteed effective for 24 hours from the time they're used successfully. After this time window, they will be recycled and existing keys will therefore be treated as new.
      operationId: post-v1.0-transactions-externalTransfer
      parameters:
        - $ref: '#/components/parameters/content-type'
        - name: Authorization
          in: header
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalTransfer'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    $ref: '#/components/schemas/ResponseStatus.v1_1'
                  externalTransfer:
                    $ref: '#/components/schemas/ExternalTransferResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
      security:
        - apiKey: []
        - basicAuth: []
        - jwtAuth: []
      servers:
        - url: 'https://localhost:8080'
