    TransactionCommit:
      type: object
      title: TransactionCommit
      description: |-
        This Object is configured to facilitate the error scenarios while creating External Transfer and Disbursement. The reason for this is to avoid creating multiple accounts, transfers and Disbursements.
        The Response will contain the CommitPointInfo Logic. 

        Scenario 1: New Process or failed before or while Creating Account
        "commitPointInfo": {
                "commitPoint": null,
                "accountId": null,
                "externalTransferId": null
            }

        1. Create Business Owner
            a.Save All Documents
            b.Save UserDefinedFields
        2. Create All Individual Customers
            a.Save Documents
            b.Save User Defined Fields
        3. Create Account
            a.Save Documents
            b.Save UserDefinedFields
        4. Create External Transfer
        5. Create Disbursement

        Scenario 2: Failed while Creating External Transfer after Creating an account 
        "commitPointInfo": {
                "commitPoint": ACCOUNT_CREATED,
                "accountId": "590672483",
                "externalTransferId": null
            }
        1. Retrieve Business Owner with Tax id
        2. Retrieve All Individual Customers with Tax ID
        3. Retrieve Account with the account ID passed
        4. Create External Transfer
        5. Create Disbursement

        Scenario 3: Failed while Creating Disbursement after Creating an External Transfer 
        "commitPointInfo": {
                "commitPoint": EXTERNAL_TRANSFER_CREATED,
                "accountId": "590672483",
                "externalTransferId": "591683101"
            }
        1. Retrieve Business Owner with Tax id
        2. Retrieve All Individual Customers with Tax ID
        3. Retrieve Account with the account ID passed
        4. Retrieve External Transfer with the External Transfer ID passed
        5. Create Disbursement
      properties:
        commitPoint:
          type: string
          description: |
            Possible Input Values:
            null, ACCOUNT_CREATED, EXTERNAL_TRANSFER_CREATED.

            Possible Output Values:
            null, ACCOUNT_CREATED, EXTERNAL_TRANSFER_CREATED, PROCESS_COMPLETE
        accountId:
          type: string
          description: Enter Account ID from the previous failure response if it failed after creating Account
        externalTransferId:
          type: string
          description: Enter External Transfer ID from the previous failure response if it failed after creating External Transfer
    UserDefinedFields:
