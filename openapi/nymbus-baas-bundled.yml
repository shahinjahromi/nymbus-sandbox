                    example: 456830
                  accountNumber:
                    type: string
                    example: '3456890435'
                  transactionAmount:
                    type: number
                    example: 150
                  description:
                    type: string
                    example: Description
                  transactionCode:
                    type: string
                    example: '131'
                  reversalTransactionCode:
                    type: string
                    example: '178'
                  reversalFlag:
                    type: boolean
                    default: false
                  creditFlag:
                    type: integer
                    example: 0
                  floatDays:
                    type: integer
                    example: 3
                  analysisFlag:
                    type: boolean
                    default: true
