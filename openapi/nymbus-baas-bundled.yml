    AccountDocumentResponse:
      type: object
      title: Account Document Response
      description: 'This is a 2 step process, upload file and take a token from the response to pass in attachmentToken.'
      properties:
        docRootid:
          type: string
        parentCategory:
          type: string
        category:
          type: string
        notes:
          type: string
      x-tags:
        - Accounts
    ExternalTransfer.v1_1:
      type: object
      properties:
        type:
          type: string
          description: |-
            **Alloweed Values**

            - External Transfer
            - External Loan Payment
            - External Loan Principal Only Transfer
        nextDateOfTransfer:
          type: string
          description: |-
            1. Should be in "yyyy-MM-dd" format
            2. Should be today or a Future Date
            3. Required to be passed only for Types: External Transfer and External Loan Principal Only Transfer
            4. Value passed for Type: External Loan Payment will not be considered and will not be stored
        expirationDate:
          type: string
          description: |-
            Should be in format: yyyy-MM-dd
            Should be a future Date
        accountNumber:
          type: string
          description: Required and Should belong to the Customer
        otherRecipientName:
          type: string
        standardEntryClassCode:
          type: string
          description: |-
            **Allowed Values**
            - Business
            - Personal
        frequency:
          type: string
          description: |-
            Will not be considered for type External Loan Payment and not stored
            **Allowed Values**

            - Daily
            - Weekly
            - Bi-weekly
            - Semi-monthly
            - Monthly
            - Bi-monthly
            - Quarterly
            - Semi-annual
            - Annual
            - One time only
        amount:
          type: number
          description: |-
            Required for types External Transfer and External Loan Principal Only Transfer.
            Value passed for External Loan Payment will not be considered or stored.
        leadDays:
          type: integer
          description: |-
