  /v1.0/customers/search:
    post:
      tags:
        - customers
      summary: Search Customer
      description: |-
        Retrieves the Customer with the given search criteria.
        The customer must provide the ssn or email and the authorization in order to get the customer details.
      operationId: post-v1.1-customers-search
      parameters:
        - $ref: '#/components/parameters/content-type'
        - name: Authorization
          in: header
          schema:
            type: string
      requestBody:
        description: 'Search for a customer by using customer Id, email address, account number or tax Id / SSN'
        content:
          application/json:
            schema:
              type: object
              properties:
                customerid:
                  type: string
                  example: '45377'
                email:
                  type: string
                  example: test@email.com
                accountnumber:
                  type: string
                  example: '457823991'
                taxid:
                  type: string
                  description: Either SSN for Individual or taxId for Business
                  example: '8135672345'
                name:
                  type: string
                  description: 'Partial Search '
                webloginid:
                  type: string
                clientid:
                  type: string
              x-examples:
                example-1:
                  ssn: '1234567'
                  email: test@example.com
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer-common.v1_1'
        '401':
          description: Unauthorized
        '404':
